name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what you see.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Run `supaforge scan`
        2. With config '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error output if applicable.
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Affected Layer
      description: Which drift layer is affected (if applicable)?
      options:
        - Schema (Layer 1)
        - RLS Policies (Layer 2)
        - Edge Functions (Layer 3)
        - Storage (Layer 4)
        - Auth Config (Layer 5)
        - Cron Jobs (Layer 6)
        - Reference Data (Layer 7)
        - Webhooks (Layer 8)
        - Scanner / CLI
        - Configuration
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SupaForge Version
      description: What version are you using? (`supaforge --version`)
      placeholder: e.g., 0.2.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you using? (`node --version`)
      placeholder: e.g., 20.11.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context — screenshots, config snippets, error logs.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct.
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
