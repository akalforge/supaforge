# Docker Compose for SupaForge integration tests.
#
# Spins up two plain Postgres instances (source + target) with
# Supabase-compatibility stubs so the integration test suite can
# verify drift detection across RLS, cron, and webhooks layers.
#
# Works with both Docker and Podman (podman-compose).
#
# Usage:
#   docker compose -f tests/docker-compose.test.yml up -d
#   podman-compose -f tests/docker-compose.test.yml up -d

services:
  source-db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: source-test-pass
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql/data

  target-db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: target-test-pass
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql/data
